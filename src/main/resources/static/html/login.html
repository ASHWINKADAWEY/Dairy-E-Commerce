<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Farm's Pure</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: var(--black);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* Left panel — image side */
    .login-visual {
      position: relative; overflow: hidden;
      background: var(--dark-grey);
    }
    .login-visual img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: grayscale(20%) brightness(0.45);
    }
    .login-visual-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(201,168,76,0.15));
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 48px;
    }
    .login-visual-tag {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold);
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .login-visual-tag::before { content: ''; width: 24px; height: 1px; background: var(--gold); }
    .login-visual h2 {
      font-family: var(--font-display);
      font-size: 2.4rem; font-weight: 900;
      color: var(--white); line-height: 1.15;
    }
    .login-visual h2 em { font-style: italic; color: var(--gold-light); display: block; }
    .login-visual p {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem; margin-top: 12px; max-width: 320px; line-height: 1.7;
    }

    /* Right panel — form */
    .login-form-panel {
      display: flex; flex-direction: column;
      justify-content: center; padding: 60px 52px;
      background: var(--off-black);
    }
    .login-logo {
      font-family: var(--font-display);
      font-size: 1.2rem; font-weight: 700;
      color: var(--white); margin-bottom: 52px;
      display: flex; align-items: center; gap: 8px;
    }
    .login-logo .brand-dot { background: var(--gold); }

    .form-title {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 900; color: var(--white);
      margin-bottom: 6px;
    }
    .form-sub { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 36px; }

    .field-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      display: block; margin-bottom: 8px;
    }
    .field-wrap { position: relative; margin-bottom: 20px; }
    .field-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 1rem; pointer-events: none;
    }
    .field-wrap .form-control-dark { padding-left: 44px; }

    .btn-login {
      width: 100%; padding: 15px;
      background: var(--gold); color: var(--black);
      border: none; font-family: var(--font-body);
      font-size: 0.9rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; border-radius: var(--radius-sm);
      transition: var(--transition); margin-top: 8px;
    }
    .btn-login:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error-box {
      background: rgba(229,57,53,0.12);
      border: 1px solid rgba(229,57,53,0.3);
      color: #EF9A9A; padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem; margin-bottom: 20px;
      display: none;
    }

    .form-divider { text-align: center; margin: 24px 0; color: rgba(255,255,255,0.15); font-size: 0.8rem; }

    .register-link {
      text-align: center; font-size: 0.88rem;
      color: rgba(255,255,255,0.35); margin-top: 8px;
    }
    .register-link a { color: var(--gold); font-weight: 600; }
    .register-link a:hover { color: var(--gold-light); }

    .demo-hint {
      margin-top: 32px; padding: 16px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius-sm);
      background: rgba(201,168,76,0.05);
    }
    .demo-hint .hint-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
    }
    .demo-hint p { font-size: 0.82rem; color: rgba(255,255,255,0.4); line-height: 1.8; }
    .demo-hint code {
      color: var(--gold-light); background: rgba(255,255,255,0.06);
      padding: 1px 6px; border-radius: 3px; font-size: 0.82rem;
    }

    @media (max-width: 900px) {
      body { grid-template-columns: 1fr; }
      .login-visual { display: none; }
      .login-form-panel { padding: 40px 24px; min-height: 100vh; }
    }
  </style>
</head>
<body>

<!-- Left Visual -->
<div class="login-visual">
  <img src="https://images.unsplash.com/photo-1550583724-b2692b85b150?w=500" alt="Fresh Dairy">
  <div class="login-visual-overlay">
    <div class="login-visual-tag">Farm's Pure</div>
    <h2>Welcome <em>Back.</em></h2>
    <p>Your daily dose of freshness awaits. Login to shop our pure dairy collection.</p>
  </div>
</div>

<!-- Right Form -->
<div class="login-form-panel">
  <div class="login-logo"><span class="brand-dot"></span> Farm's Pure</div>

  <div class="form-title">Sign In</div>
  <div class="form-sub">Enter your credentials to continue</div>

  <div class="error-box" id="errorBox"></div>

  <label class="field-label">Email Address</label>
  <div class="field-wrap">
    <span class="field-icon">📧</span>
    <input type="email" id="email" class="form-control-dark"
      placeholder="you@example.com"
      autocomplete="off">
  </div>

  <label class="field-label">Password</label>
  <div class="field-wrap">
    <span class="field-icon">🔒</span>
    <input type="password" id="password" class="form-control-dark"
      placeholder="Enter your password"
      autocomplete="new-password">
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In →</button>

  <div class="form-divider">— or —</div>

  <div class="register-link">
    Don't have an account? <a href="/html/register.html">Register Free</a>
  </div>
  <div class="register-link mt-2">
    <a href="/html/index.html">← Back to Home</a>
  </div>

  <div class="demo-hint">
    <div class="hint-label">Demo Credentials</div>
    <p>
      Email: <code>FarmsPureUser@gmail.com</code><br>
      Password: <code>User@123</code>
    </p>
  </div>
</div>

<script>
  // Already logged in? Redirect
  var role = localStorage.getItem('userRole');
  if (role === 'ADMIN') { location.href = '/html/admin-dashboard.html'; }
  else if (role === 'USER') { location.href = '/html/user_dashboard.html'; }

  // Clear fields on load
  window.onload = function() {
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
  };

  // Enter key = login
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { doLogin(); }
  });

  function doLogin() {
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var btn      = document.getElementById('loginBtn');
    var errBox   = document.getElementById('errorBox');

    errBox.style.display = 'none';
    if (!email || !password) { showErr('Please enter email and password.'); return; }

    btn.disabled    = true;
    btn.textContent = 'Signing in…';

    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email: email, password: password })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.success) {
        localStorage.setItem('userId',    data.data.id);
        localStorage.setItem('userName',  data.data.fullName);
        localStorage.setItem('userEmail', data.data.email);
        localStorage.setItem('userRole',  data.data.role);
        localStorage.setItem('userPhone', data.data.phone || '');
        if (data.data.role === 'ADMIN') { location.href = '/html/admin-dashboard.html'; }
        else { location.href = '/html/user_dashboard.html'; }
      } else {
        showErr(data.message || 'Invalid email or password.');
        btn.disabled = false; btn.textContent = 'Sign In →';
      }
    })
    .catch(function() {
      showErr('Server error. Please make sure the app is running.');
      btn.disabled = false; btn.textContent = 'Sign In →';
    });
  }

  function showErr(msg) {
    var box = document.getElementById('errorBox');
    box.textContent = '⚠ ' + msg;
    box.style.display = 'block';
  }
</script>
</body>
</html>
